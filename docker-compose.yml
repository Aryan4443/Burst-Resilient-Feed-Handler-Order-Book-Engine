services:
  live:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SYMBOL: BTCUSDT
      MARKET: both
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
